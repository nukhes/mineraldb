<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="description" content="Mineral Database - IMA cataloged minerals with search by properties, elements, and location">
    <link rel="stylesheet" href="css/pico.fluid.classless.indigo.min.css">
    <title>mineraldb</title>
    <style>
        body { margin: 0; }
        header { text-align: center; padding: 2rem 1rem; border-bottom: 1px solid var(--muted-border-color); }
        header h1 { margin: 0.5rem 0; font-size: 2.5rem; }
        header p { margin: 0; color: var(--muted-color); }
        #search-container { text-align: center; padding: 2rem 1rem; }
        #search { width: min(100%, 30rem); padding: 0.75rem; font-size: 1rem; }
        main { max-width: 60rem; margin: 0 auto; padding: 0 1rem; }
        #results { margin: 2rem 0; }
        .mineral-card { border: 1px solid var(--muted-border-color); padding: 1.5rem; margin: 0.75rem 0; border-radius: 0.5rem; cursor: pointer; transition: background 0.2s; }
        .mineral-card:hover { background: var(--muted-bg); }
        .mineral-card h3 { margin: 0 0 0.5rem 0; }
        .mineral-card p { margin: 0; color: var(--muted-color); font-size: 0.9rem; }
        #detail { display: none; margin: 3rem 0; border-top: 2px solid var(--muted-border-color); padding-top: 2rem; }
        #detail h2 { margin-bottom: 1.5rem; }
        #detail > div { margin-bottom: 2rem; }
        .detail-section h3 { font-size: 1rem; margin-bottom: 0.75rem; color: var(--muted-color); }
        .property-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(15rem, 1fr)); gap: 1rem; }
        .property-item { padding: 1rem; background: var(--muted-bg); border-radius: 0.25rem; }
        .property-item strong { display: block; color: var(--muted-color); font-size: 0.85rem; margin-bottom: 0.25rem; }
        .element-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .element-tag { background: var(--muted-bg); padding: 0.35rem 0.65rem; border-radius: 0.25rem; font-size: 0.85rem; border: 1px solid var(--muted-border-color); }
        .no-results { text-align: center; color: var(--muted-color); padding: 2rem; }
    </style>
</head>
<body>
    <header>
        <h1>mineraldb</h1>
        <p>Minerals cataloged by the International Mineralogical Association</p>
    </header>
    <main>
        <section id="search-container">
            <input id="search" type="text" placeholder="Search by mineral name, element, or property..." autocomplete="off">
        </section>
        <section id="results"></section>
        <article id="detail"></article>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
